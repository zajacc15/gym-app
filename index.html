  const toggle = name => setExpandedSet(prev => {
    const next = new Set(prev);
    next.has(name) ? next.delete(name) : next.add(name);
    return next;
  });

  return (
    <div>
      {entries.map(([name, r])=>{
        const expanded = expandedSet.has(name);
        return (
          <div key={name} className="card" style={{marginBottom:12}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer'}} onClick={()=>toggle(name)}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <h3>{name}</h3>
                <span style={{fontSize:12,color:'var(--muted)',background:'var(--surface3)',borderRadius:8,padding:'3px 9px',fontWeight:600}}>{r.sessions} sessions</span>
              </div>
              <i className={`ti ${expanded?'ti-chevron-up':'ti-chevron-down'}`} style={{fontSize:16,color:'var(--muted)'}}></i>
            </div>
            {expanded && (
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,alignItems:'stretch',marginTop:12}}>
                <div style={{background:'var(--surface3)',borderRadius:10,padding:'10px 12px',textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
                  <div style={{fontSize:18,fontWeight:800,color:'var(--accent)'}}>{Math.round(r.best1RM*10)/10}</div>
                  <div style={{fontSize:10,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:.5,marginTop:3}}>Est. 1RM kg</div>
                </div>
                <div style={{background:'var(--surface3)',borderRadius:10,padding:'10px 12px',textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
                  <div style={{fontSize:18,fontWeight:800,color:'var(--accent)'}}>{r.maxWeight}</div>
                  <div style={{fontSize:10,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:.5,marginTop:2}}>Max kg</div>
                  <div style={{fontSize:9.9,color:'var(--muted)',marginTop:2}}>(× {r.maxWeightReps} reps)</div>
                  {r.maxWeightDate && <div style={{fontSize:9.9,color:'var(--muted)',marginTop:1}}>{fmtShort(r.maxWeightDate)}</div>}
                </div>
                <div style={{background:'var(--surface3)',borderRadius:10,padding:'10px 12px',textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>
                  <div style={{fontSize:18,fontWeight:800,color:'var(--accent)'}}>{r.maxReps}</div>
                  <div style={{fontSize:10,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:.5,marginTop:2}}>Max reps</div>
                  <div style={{fontSize:9.9,color:'var(--muted)',marginTop:2}}>(@ {r.maxRepsWeight} kg)</div>
                  {r.maxRepsDate && <div style={{fontSize:9.9,color:'var(--muted)',marginTop:1}}>{fmtShort(r.maxRepsDate)}</div>}
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ── Progress: Volume view ─────────────────────────────────────────────────────
function ProgressVolumeView({ workouts }) {
  const chartRef = useRef(null);
  const chartInstance = useRef(null);
  const [period, setPeriod] = useState('weekly');

  // Group workouts by week or month
  const grouped = {};
  workouts.forEach(w => {
    const d = new Date(w.date);
    let key;
    if(period === 'weekly') {
      const day = d.getDay()===0?6:d.getDay()-1;
      const monday = new Date(d); monday.setDate(d.getDate()-day);
      key = monday.toISOString().slice(0,10);
    } else {
      key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    }
    if(!grouped[key]) grouped[key] = 0;
    w.exercises.forEach(ex => {
      if((ex.mode||'strength')==='strength') {
        (ex.sets||[]).forEach(s => {
          grouped[key] += (parseFloat(s.weight)||0) * (parseFloat(s.reps)||0);
        });
      }
    });
  });

  const labels = Object.keys(grouped).sort();
  const values = labels.map(k => Math.round(grouped[k]));

  const fmtLabel = k => period==='weekly'
    ? new Date(k+'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short'})
    : new Date(k+'-01T00:00:00').toLocaleDateString('en-GB',{month:'short',year:'2-digit'});

  useEffect(()=>{
    if(!chartRef.current||labels.length===0){
      if(chartInstance.current){chartInstance.current.destroy();chartInstance.current=null;}
      return;
    }
    if(chartInstance.current){chartInstance.current.destroy();chartInstance.current=null;}
    const ctx = chartRef.current.getContext('2d');
    chartInstance.current = new Chart(ctx,{
      type:'bar',
      data:{
        labels: labels.map(fmtLabel),
        datasets:[{
          data: values,
          backgroundColor:'rgba(29,78,216,0.7)',
          borderColor:'#1D4ED8',
          borderWidth:1.5,
          borderRadius:6,
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{backgroundColor:'#1c1c2e',borderColor:'#2e2e45',borderWidth:1,titleColor:'#8884a0',bodyColor:'#1D4ED8',bodyFont:{size:13,weight:'700'},callbacks:{label:ctx=>`${ctx.parsed.y.toLocaleString()} kg`}}},
        scales:{
          x:{ticks:{color:'#8884a0',font:{size:10}},grid:{display:false},border:{color:'rgba(255,255,255,0.06)'}},
          y:{ticks:{color:'#8884a0',font:{size:10},callback:v=>v>=1000?`${(v/1000).toFixed(1)}t`:`${v}kg`},grid:{color:'rgba(255,255,255,0.04)'},border:{color:'rgba(255,255,255,0.06)'}}
        }
      }
    });
    return ()=>{if(chartInstance.current){chartInstance.current.destroy();chartInstance.current=null;}};
  },[period, workouts]);

  if(workouts.length===0) return <div className="empty"><i className="ti ti-chart-bar"></i>No data yet</div>;

  const totalVolumeAll = values.reduce((a,b)=>a+b,0);
  const avgVolume = values.length ? Math.round(totalVolumeAll/values.length) : 0;
  const maxVolume = values.length ? Math.max(...values) : 0;

  return (
    <div>
      <div style={{display:'flex',gap:4,background:'var(--surface)',padding:3,borderRadius:10,marginBottom:16}}>
        {[['weekly','Weekly'],['monthly','Monthly']].map(([k,l])=>(
          <button key={k} onClick={()=>setPeriod(k)} style={{
            flex:1,padding:'7px 8px',borderRadius:8,border:'none',fontSize:12,fontWeight:600,
            background:period===k?'var(--surface3)':'transparent',
            color:period===k?'var(--accent)':'var(--muted)'
          }}>{l}</button>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>
        <div className="stat-box"><div className="stat-val" style={{fontSize:16}}>{totalVolumeAll>=1000?`${(totalVolumeAll/1000).toFixed(1)}t`:`${totalVolumeAll}kg`}</div><div className="stat-lbl">Total</div></div>
        <div className="stat-box"><div className="stat-val" style={{fontSize:16}}>{avgVolume>=1000?`${(avgVolume/1000).toFixed(1)}t`:`${avgVolume}kg`}</div><div className="stat-lbl">Avg / {period==='weekly'?'week':'month'}</div></div>
        <div className="stat-box"><div className="stat-val" style={{fontSize:16}}>{maxVolume>=1000?`${(maxVolume/1000).toFixed(1)}t`:`${maxVolume}kg`}</div><div className="stat-lbl">Best {period==='weekly'?'week':'month'}</div></div>
      </div>
      <div className="card" style={{padding:'16px 14px'}}>
        <div style={{fontSize:11,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:.6,marginBottom:12}}>Total volume (kg)</div>
        <div style={{height:200,position:'relative'}}><canvas ref={chartRef}></canvas></div>
      </div>
    </div>
  );
}

// ── Progress: Stats view ──────────────────────────────────────────────────────
function ProgressStatsView({ workouts }) {
  if(workouts.length===0) return <div className="empty"><i className="ti ti-chart-pie"></i>No data yet</div>;

  const sorted = [...workouts].sort((a,b)=>new Date(a.date)-new Date(b.date));

  // Total workouts
  const totalWorkouts = workouts.length;

  // Total volume
  let totalVolAcc = 0;
  workouts.forEach(w => w.exercises.forEach(ex => {
    if((ex.mode||'strength')==='strength') (ex.sets||[]).forEach(s=>{ totalVolAcc += (parseFloat(s.weight)||0)*(parseFloat(s.reps)||0); });
  }));

  // Streak calculation
  const workoutDays = [...new Set(workouts.map(w=>new Date(w.date).toISOString().slice(0,10)))].sort();
  let currentStreak=0, longestStreak=0, streak=1;
  for(let i=1;i<workoutDays.length;i++){
    const diff = (new Date(workoutDays[i])-new Date(workoutDays[i-1]))/(1000*60*60*24);
    if(diff===1) { streak++; longestStreak=Math.max(longestStreak,streak); }
    else { streak=1; }
  }
  if(workoutDays.length>0){
    const lastDay = new Date(workoutDays[workoutDays.length-1]);
    const today = new Date(); today.setHours(0,0,0,0);
    const diffToday = (today-lastDay)/(1000*60*60*24);
    if(diffToday<=1) currentStreak=streak; else currentStreak=0;
    longestStreak=Math.max(longestStreak,streak);
  }

  // Avg workouts per week
  const firstDate = new Date(sorted[0].date);
  const lastDate  = new Date(sorted[sorted.length-1].date);
  const weeks = Math.max(1, (lastDate-firstDate)/(1000*60*60*24*7));
  const avgPerWeek = (totalWorkouts/weeks).toFixed(1);

  // Most trained exercise
  const exCount = {};
  workouts.forEach(w=>w.exercises.forEach(ex=>{ const k=toSentenceCase(ex.name); exCount[k]=(exCount[k]||0)+1; }));
  const mostTrained = Object.entries(exCount).sort((a,b)=>b[1]-a[1])[0];

  // Favourite day
  const dayCounts = Array(7).fill(0);
  workouts.forEach(w=>{ dayCounts[new Date(w.date).getDay()]++; });
  const dayNames2 = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const favDay = dayNames2[dayCounts.indexOf(Math.max(...dayCounts))];

  return (
    <div>
      <div className="stat-row" style={{marginBottom:10}}>
        <div className="stat-box"><div className="stat-val">{totalWorkouts}</div><div className="stat-lbl">Total workouts</div></div>
        <div className="stat-box"><div className="stat-val">{avgPerWeek}×</div><div className="stat-lbl">Per week avg</div></div>
        <div className="stat-box"><div className="stat-val">{currentStreak}</div><div className="stat-lbl">Current streak</div></div>
        <div className="stat-box"><div className="stat-val">{longestStreak}</div><div className="stat-lbl">Longest streak</div></div>
      </div>
      <div className="card" style={{marginBottom:10}}>
        <div style={{fontSize:11,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:.6,marginBottom:12}}>Lifetime volume</div>
        <div style={{fontSize:32,fontWeight:900,color:'var(--accent)'}}>{totalVolAcc>=1000?`${(totalVolAcc/1000).toFixed(1)}t`:`${Math.round(totalVolAcc)}kg`}</div>
        <div style={{fontSize:13,color:'var(--muted)',marginTop:4}}>total weight moved across all workouts</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div className="card">
          <div style={{fontSize:11,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:.6,marginBottom:8}}>Most trained</div>
          <div style={{fontWeight:700,fontSize:14}}>{mostTrained?.[0]||'—'}</div>
          <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{mostTrained?.[1]||0} times</div>
        </div>
        <div className="card">
          <div style={{fontSize:11,color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:.6,marginBottom:8}}>Favourite day</div>
          <div style={{fontWeight:700,fontSize:14}}>{favDay}</div>
          <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>{dayCounts[dayNames2.indexOf(favDay)]} workouts</div>
        </div>
      </div>
    </div>
  );
}

// ── CalendarTab ───────────────────────────────────────────────────────────────
function CalendarTab({ workouts, templates, onAddWorkout, onAddFromTemplate, onOpenWorkout, returnToDate }) {
  const today = new Date();
  const returnDate = returnToDate ? new Date(returnToDate+'T00:00:00') : null;
  const [year,  setYear]  = useState(returnDate ? returnDate.getFullYear() : today.getFullYear());
  const [month, setMonth] = useState(returnDate ? returnDate.getMonth() : today.getMonth());

  const daysInMonth  = new Date(year, month + 1, 0).getDate();
  const firstDayOfWeek = new Date(year, month, 1).getDay(); // 0=Sun
  // Adjust so Monday = 0
  const startOffset = (firstDayOfWeek + 6) % 7;

  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const dayNames   = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

  // Group workouts by YYYY-MM-DD
  const byDate = {};
  workouts.forEach(w => {
    const d = new Date(w.date);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(!byDate[key]) byDate[key] = [];
    byDate[key].push(w);
  });

  const [selected,      setSelected]      = useState(returnToDate||null);
  const [showTplPicker, setShowTplPicker] = useState(false);

  const prevMonth = () => { if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1); setSelected(null); };
  const nextMonth = () => { if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1); setSelected(null); };

  const todayKey = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  const cells = [];
  for(let i=0; i<startOffset; i++) cells.push(null);
  for(let d=1; d<=daysInMonth; d++) cells.push(d);

  const selectedKey = selected;
  const selectedWorkouts = selectedKey ? (byDate[selectedKey]||[]) : [];

  return (
    <div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
        <h2>Calendar</h2>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button className="icon-btn" style={{background:'var(--surface3)',borderRadius:10,padding:'8px 12px'}} onClick={prevMonth}>
            <i className="ti ti-chevron-left" style={{fontSize:16}}></i>
          </button>
          <span style={{fontWeight:700,fontSize:15,minWidth:110,textAlign:'center'}}>{monthNames[month]} {year}</span>
          <button className="icon-btn" style={{background:'var(--surface3)',borderRadius:10,padding:'8px 12px'}} onClick={nextMonth}>
            <i className="ti ti-chevron-right" style={{fontSize:16}}></i>
          </button>
        </div>
      </div>

      {/* Day headers */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginBottom:6}}>
        {dayNames.map(d=>(
          <div key={d} style={{textAlign:'center',fontSize:11,fontWeight:700,color:'var(--muted)',padding:'4px 0',letterSpacing:.5}}>{d}</div>
        ))}
      </div>

      {/* Day cells */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:4,marginBottom:20}}>
        {cells.map((day, i) => {
          if(!day) return <div key={`e-${i}`} />;
          const key = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
          const hasWorkout = !!byDate[key];
          const count = byDate[key]?.length || 0;
          const isToday = key === todayKey;
          const isSel   = key === selectedKey;
          return (
            <div key={key} onClick={()=>{ setSelected(isSel?null:key); setShowTplPicker(false); }}
              style={{
                aspectRatio:'1',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                borderRadius:10,cursor:hasWorkout?'pointer':'default',
                background: isSel ? 'var(--accent)' : isToday ? 'var(--surface3)' : 'transparent',
                border: isToday && !isSel ? '1.5px solid var(--border)' : '1.5px solid transparent',
                position:'relative'
              }}>
              <span style={{fontSize:14,fontWeight: isToday||isSel?700:400, color: isSel?'#ffffff': isToday?'var(--accent)':'var(--text)'}}>{day}</span>
              {hasWorkout && (
                <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2,marginTop:2}}>
                  <div style={{display:'flex',gap:2}}>
                    {(byDate[key]||[]).slice(0,3).map((w,di)=>(
                      <div key={di} style={{width:4,height:4,borderRadius:'50%',background: isSel?'#ffffff':(colorHex(w.color)||'var(--accent)')}}></div>
                    ))}
                  </div>
                  {count>3 && <span style={{fontSize:8,fontWeight:700,color:isSel?'#ffffff':'var(--accent)',lineHeight:1}}>+</span>}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Selected day workouts */}
      {selectedKey && (
        <div>
          <div className="label" style={{marginBottom:12}}>
            {new Date(selectedKey+'T00:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'2-digit',month:'long'})}
          </div>
          {selectedWorkouts.length===0
            ? <div style={{color:'var(--muted)',fontSize:14,textAlign:'center',padding:'20px 0'}}>No workouts on this day</div>
            : selectedWorkouts.map((w,i)=>(
              <div key={i} className="card" style={{marginBottom:10,cursor:'pointer',
                borderLeft: colorHex(w.color) ? `4px solid ${colorHex(w.color)}` : '1.5px solid var(--border)'
              }} onClick={()=>onOpenWorkout(w, selectedKey)}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                  <div>
                    <h3>{w.name||'Workout'}</h3>
                    <div style={{color:'var(--muted)',fontSize:13,marginTop:2}}>{fmtTime(w.date)}</div>
                  </div>
                  <span style={{fontSize:12,color:'var(--muted)',background:'var(--surface3)',borderRadius:8,padding:'4px 10px',fontWeight:600}}>{w.exercises.length} exercises</span>
                </div>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {w.exercises.slice(0,4).map((ex,ei)=><span key={ei} className="chip" style={{fontSize:12,
                    background: colorHex(w.color) ? `${colorHex(w.color)}22` : 'rgba(29,78,216,.12)',
                    color: colorHex(w.color) || 'var(--accent)'
                  }}>{ex.name}</span>)}
                  {w.exercises.length>4&&<span style={{fontSize:12,color:colorHex(w.color)||'var(--muted)'}}>+{w.exercises.length-4}</span>}
                </div>
              </div>
            ))
          }
          <div style={{display:'flex',flexDirection:'column',gap:8,marginTop:8}}>
            <button className="btn-primary" style={{display:'flex',alignItems:'center',gap:8,justifyContent:'center'}}
              onClick={()=>{ onAddWorkout(selectedKey); }}>
              <i className="ti ti-plus"></i> Add new workout
            </button>
            {templates.length>0 && (
              <>
                {!showTplPicker
                  ? <button className="btn-ghost" style={{width:'100%',display:'flex',alignItems:'center',gap:8,justifyContent:'center'}} onClick={()=>setShowTplPicker(true)}>
                      <i className="ti ti-layout-cards"></i> Add from template
                    </button>
                  : <div className="card" style={{padding:12}}>
                      <div className="label" style={{marginBottom:8}}>Choose template</div>
                      {templates.map((t,ti)=>(
                        <div key={ti} style={{padding:'10px 12px',borderRadius:10,cursor:'pointer',background:'var(--surface3)',marginBottom:6,fontWeight:600,fontSize:14}}
                          onClick={()=>{ onAddFromTemplate(t, selectedKey); setShowTplPicker(false); }}>
                          {t.name}
                          <div style={{fontSize:12,color:'var(--muted)',fontWeight:400,marginTop:2}}>{t.exercises.length} exercises</div>
                        </div>
                      ))}
                      <button className="btn-ghost" style={{width:'100%',marginTop:4,padding:'10px',fontSize:13}} onClick={()=>setShowTplPicker(false)}>Cancel</button>
                    </div>
                }
              </>
            )}
          </div>
        </div>
      )}

      {workouts.length===0 && (
        <div className="empty"><i className="ti ti-calendar"></i>No workouts yet<br/><small style={{marginTop:8,display:'block'}}>Your training days will appear here</small></div>
      )}
    </div>
  );
}


// ── ExportImport ──────────────────────────────────────────────────────────────
function ExportImport({ workouts, templates, setWorkouts, setTemplates }) {
  const [importing, setImporting] = useState(false);
  const [importError, setImportError] = useState(null);
  const [importSuccess, setImportSuccess] = useState(false);

  const handleExport = () => {
    const data = {
      version: 1,
      exportedAt: new Date().toISOString(),
      workouts,
      templates,
    };
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `gym-log-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setImportError(null);
    setImportSuccess(false);
    const reader = new FileReader();
    reader.onload = async (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.workouts || !data.templates) throw new Error('Invalid file format');
        const mergedWorkouts  = [...workouts,  ...data.workouts.filter(w  => !workouts.find(x  => x.date === w.date && x.name === w.name))];
        const mergedTemplates = [...templates, ...data.templates.filter(t  => !templates.find(x  => x.name === t.name))];
        setWorkouts(mergedWorkouts);
        setTemplates(mergedTemplates);
        await dbSave('workouts',  mergedWorkouts);
        await dbSave('templates', mergedTemplates);
        setImportSuccess(true);
        setTimeout(() => setImportSuccess(false), 3000);
      } catch(err) {
        setImportError('Invalid file. Please use a GYM LOG backup (.json).');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  return (
    <div>
      <h2 style={{marginBottom:6}}>Settings</h2>
      <p style={{color:'var(--muted)',fontSize:13,marginBottom:20,lineHeight:1.5}}>
        Export your data as a JSON backup file. Import merges data without overwriting existing entries.
      </p>

      <div className="card" style={{marginBottom:12}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
          <div style={{width:40,height:40,borderRadius:12,background:'rgba(29,78,216,.12)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <i className="ti ti-download" style={{fontSize:20,color:'var(--accent)'}}></i>
          </div>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>Export backup</div>
            <div style={{color:'var(--muted)',fontSize:13}}>{workouts.length} workouts · {templates.length} templates</div>
          </div>
        </div>
        <button className="btn-primary" onClick={handleExport}>
          <i className="ti ti-download"></i> Download JSON backup
        </button>
      </div>

      <div className="card">
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}>
          <div style={{width:40,height:40,borderRadius:12,background:'rgba(91,159,255,.12)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <i className="ti ti-upload" style={{fontSize:20,color:'var(--blue)'}}></i>
          </div>
          <div>
            <div style={{fontWeight:700,fontSize:15}}>Import backup</div>
            <div style={{color:'var(--muted)',fontSize:13}}>Merges with existing data</div>
          </div>
        </div>
        {importError && (
          <div style={{background:'rgba(255,95,126,.1)',border:'1.5px solid rgba(255,95,126,.25)',borderRadius:10,padding:'10px 12px',fontSize:13,color:'var(--red)',marginBottom:10}}>
            <i className="ti ti-alert-triangle" style={{marginRight:6}}></i>{importError}
          </div>
        )}
        {importSuccess && (
          <div style={{background:'rgba(29,78,216,.1)',border:'1.5px solid rgba(29,78,216,.25)',borderRadius:10,padding:'10px 12px',fontSize:13,color:'var(--accent)',marginBottom:10}}>
            <i className="ti ti-check" style={{marginRight:6}}></i>Data imported successfully!
          </div>
        )}
        <label style={{display:'block',cursor:'pointer'}}>
          <input type="file" accept=".json" onChange={handleImport} style={{display:'none'}} />
          <div className="btn-blue" style={{display:'flex',alignItems:'center',gap:8,justifyContent:'center',padding:'14px 20px',borderRadius:12,fontWeight:700,fontSize:15}}>
            <i className="ti ti-upload"></i> Choose JSON file
          </div>
        </label>
      </div>

      <div style={{marginTop:20,padding:'14px 16px',background:'var(--surface3)',borderRadius:12}}>
        <div style={{fontSize:12,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.6,marginBottom:6}}>Tip</div>
        <div style={{fontSize:13,color:'var(--muted)',lineHeight:1.5}}>
          Export regularly to keep a backup. Use Import to transfer data between devices or browsers.
        </div>
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab,       setTab]       = useState('templates');
  const [templates, setTemplates] = useState([]);
  const [workouts,  setWorkouts]  = useState([]);
  const [loaded,    setLoaded]    = useState(false);

  // All tab states live here — never unmount, never reset on tab switch
  const [tplState,  setTplState]  = useState({creating:false,name:'',exInput:'',exercises:[],editing:null});
  const [wktState,  setWktState]  = useState({active:null,note:''});
  const [histState, setHistState] = useState({detail:null});
  const [progState, setProgState] = useState({selectedEx:null,metric:'1rm'});

  const [startTemplate,  setStartTemplate]  = useState(null);
  const [repeatWorkout,  setRepeatWorkout]  = useState(null);
  const [calendarReturn, setCalendarReturn] = useState(null); // dateKey to return to

  // Load both stores from IndexedDB on first render
  useEffect(()=>{
    (async()=>{
      const [t,w] = await Promise.all([dbLoad('templates'), dbLoad('workouts')]);
      // Normalize exercise names on load
      const normW = w.map(workout => ({...workout, exercises: workout.exercises.map(ex => ({...ex, name: toSentenceCase(ex.name)}))}));
      const normT = t.map(tpl => ({...tpl, exercises: tpl.exercises.map(n => toSentenceCase(n))}));
      setTemplates(normT);
      setWorkouts(normW);
      // Persist normalized data back
      await Promise.all([dbSave('templates', normT), dbSave('workouts', normW)]);
      setLoaded(true);
    })();
  },[]);

  if(!loaded) return (
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'50vh',flexDirection:'column',gap:16}}>
      <div style={{width:48,height:48,border:'3px solid var(--border)',borderTopColor:'var(--accent)',borderRadius:'50%',animation:'spin 1s linear infinite'}}></div>
      <span style={{color:'var(--muted)'}}>Loading...</span>
    </div>
  );

  const tabs=[['templates','ti-layout-cards','Templates'],['workout','ti-barbell','Workout'],['history','ti-history','History'],['progress','ti-chart-line','Progress'],['calendar','ti-calendar','Calendar'],['data','ti-settings','Settings']];

  return (
    <div style={{maxWidth:420,margin:'0 auto',padding:'20px 16px 32px'}}>
      <div style={{textAlign:'center',marginBottom:24}}>
        <span style={{fontSize:26,fontWeight:900,letterSpacing:'-1px',color:'var(--accent)'}}>GYM</span>
        <span style={{fontSize:26,fontWeight:300,color:'var(--muted)',marginLeft:8}}>LOG</span>
      </div>
      <div className="tab-bar">
        {tabs.map(([key,icon,label])=>(
          <button key={key} className={`tab${tab===key?' active':''}`} onClick={()=>{ setTab(key); if(key!=='progress') setProgState(s=>({...s,progressView:'exercise'})); }}>
            <i className={`ti ${icon}`} style={{fontSize:14,display:'block',marginBottom:2}}></i>{label}
          </button>
        ))}
      </div>

      {/* All tabs stay mounted — only visibility toggles — preserving state */}
      <div style={{display:tab==='templates'?'block':'none'}}>
        <TemplatesTab templates={templates} setTemplates={setTemplates}
          onStartWorkout={t=>{setStartTemplate(t);setTab('workout');}}
          tplState={tplState} setTplState={setTplState} />
      </div>
      <div style={{display:tab==='workout'?'block':'none'}}>
        <WorkoutTab workouts={workouts} setWorkouts={setWorkouts} templates={templates}
          wktState={wktState} setWktState={setWktState}
          onDiscardFromTemplate={()=>setTab('templates')}
          startTemplate={startTemplate} repeatWorkout={repeatWorkout}
          onClearTemplate={()=>setStartTemplate(null)} onClearRepeat={()=>setRepeatWorkout(null)} />
      </div>
      <div style={{display:tab==='history'?'block':'none'}}>
        <HistoryTab workouts={workouts} setWorkouts={setWorkouts}
          templates={templates} setTemplates={setTemplates}
          histState={histState} setHistState={setHistState}
          onRepeatWorkout={w=>setRepeatWorkout(w)} setTab={setTab}
          calendarReturn={calendarReturn} onClearCalendarReturn={()=>setCalendarReturn(null)} />
      </div>
      <div style={{display:tab==='progress'?'block':'none'}}>
        <ProgressTab workouts={workouts} progState={progState} setProgState={setProgState} />
      </div>
      <div style={{display:tab==='calendar'?'block':'none'}}>
        <CalendarTab workouts={workouts} templates={templates}
          returnToDate={calendarReturn}
          onOpenWorkout={(w, dateKey)=>{
            setHistState(s=>({...s,detail:[...workouts].reverse().indexOf(w)}));
            setCalendarReturn(dateKey);
            setTab('history');
          }}
          onAddWorkout={(dateKey)=>{
            setWktState({active:{name:'',exercises:[],dateOverride:dateKey,timeOverride:'',startTime:new Date().toISOString()},note:''});
            setTab('workout');
          }}
          onAddFromTemplate={(tpl, dateKey)=>{
            setStartTemplate({...tpl, _dateOverride: dateKey});
            setTab('workout');
          }}
        />
      </div>
      <div style={{display:tab==='data'?'block':'none'}}>
        <ExportImport workouts={workouts} templates={templates} setWorkouts={setWorkouts} setTemplates={setTemplates} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
